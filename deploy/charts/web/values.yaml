replicaCount: 1

image:
  repository: acrhra.azurecr.io/web
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  host: hr-analytics.example.com
  tls: true
  clusterIssuer: letsencrypt-prod
  path: /
  pathType: Prefix
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

healthCheck:
  path: /
  initialDelaySeconds: 5
  periodSeconds: 15

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPU: 70
