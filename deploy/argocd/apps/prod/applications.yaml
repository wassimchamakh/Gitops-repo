# Argo CD Applications for PROD environment
# Each file here defines one Application pointing to a Helm chart + env values
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backend
  namespace: argocd
  labels:
    env: prod
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/wassimchamakh/Gitops-repo.git
    targetRevision: HEAD
    path: deploy/charts/backend
    helm:
      valueFiles:
        - /deploy/env/prod/values-backend.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
