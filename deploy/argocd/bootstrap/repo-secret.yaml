# Argo CD Repository Credential — grants access to the private hr-analytics GitHub repo.
# Apply ONCE manually (contains your GitHub PAT — never commit the filled-in token):
#
#   kubectl apply -f deploy/argocd/bootstrap/repo-secret.yaml
#
# Or use kubectl create directly (replace <YOUR_GITHUB_PAT> with a token that has
# "repo" scope):
#
#   kubectl create secret generic argocd-repo-hr-analytics \
#     -n argocd \
#     --from-literal=type=git \
#     --from-literal=url=https://github.com/wassimchamakh/hr-analytics.git \
#     --from-literal=username=wassimchamakh \
#     --from-literal=password=<YOUR_GITHUB_PAT>
#   kubectl label secret argocd-repo-hr-analytics \
#     -n argocd argocd.argoproj.io/secret-type=repository
#
# ─────────────────────────────────────────────────────────────────────────────
# WARNING: Fill in the password field before applying. Do NOT commit this file
#          with a real token. Add this filename to .gitignore, or use a sealed
#          secret / external-secrets operator for production.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: argocd-repo-hr-analytics
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
stringData:
  type: git
  url: https://github.com/wassimchamakh/hr-analytics.git
  username: wassimchamakh
  password: "<YOUR_GITHUB_PAT>"   # ← replace before applying
