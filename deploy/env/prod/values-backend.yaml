# Production values for backend — IMAGE TAG IS UPDATED BY JENKINS CI
image:
  repository: acrhraprod7e7a9fc9.azurecr.io/backend
  tag: "b20"
# Keycloak reports this as `iss` on issued tokens (browser reaches it via the
# public ingress over https), which differs from the in-cluster KEYCLOAK_URL
# used to fetch signing keys.
env:
  KEYCLOAK_ISSUER_URL: https://20.94.125.152/auth
ingress:
  host: ""
  tls: false
  path: /api
  pathType: Prefix
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
# Disable Azure Key Vault CSI integration until the driver is installed
secretProvider:
  enabled: false
  tenantId: "e04c5ae5-2eab-478d-a72f-1f314c6e8c5a"
# Disable HPA until metrics-server is confirmed installed
autoscaling:
  enabled: false
