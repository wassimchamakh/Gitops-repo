replicaCount: 1

image:
  repository: quay.io/keycloak/keycloak
  tag: "24.0"
  pullPolicy: IfNotPresent

adminUser: admin
adminPassword: admin   # change this for production

realm: hr-analytics

service:
  type: ClusterIP
  port: 8080

resources:
  limits:
    cpu: 500m
    memory: 1Gi
  requests:
    cpu: 200m
    memory: 512Mi
