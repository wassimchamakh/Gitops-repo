replicaCount: 2

image:
  repository: acrhraprod.azurecr.io/web
  tag: "latest"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80
  targetPort: 80

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 64Mi

# VITE_ variables are baked in at build time; no runtime env needed.
env: []
