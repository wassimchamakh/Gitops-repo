apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonarqube
  namespace: ci-cd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sonarqube
  template:
    metadata:
      labels:
        app: sonarqube
    spec:
      # SonarQube uses Elasticsearch internally which requires vm.max_map_count >= 262144
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: sysctl
          image: busybox:1.36
          securityContext:
            privileged: true
            runAsUser: 0
          command: ["sysctl", "-w", "vm.max_map_count=262144"]
      containers:
        - name: sonarqube
          image: sonarqube:10-community
          securityContext:
            runAsUser: 1000
          env:
            - name: SONAR_JDBC_URL
              value: "jdbc:postgresql://sonarqube-postgres:5432/sonarqube"
            - name: SONAR_JDBC_USERNAME
              value: "sonar"
            - name: SONAR_JDBC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sonarqube-postgres-secret
                  key: SONAR_JDBC_PASSWORD
            - name: SONAR_WEB_CONTEXT
              value: "/sonar"
          ports:
            - containerPort: 9000
          resources:
            requests:
              cpu: "400m"
              memory: "2Gi"
            limits:
              cpu: "1500m"
              memory: "4Gi"
          volumeMounts:
            - name: sonarqube-data
              mountPath: /opt/sonarqube/data
              subPath: data
            - name: sonarqube-data
              mountPath: /opt/sonarqube/logs
              subPath: logs
            - name: sonarqube-data
              mountPath: /opt/sonarqube/extensions
              subPath: extensions
          readinessProbe:
            httpGet:
              path: /sonar/api/system/status
              port: 9000
            initialDelaySeconds: 90
            periodSeconds: 15
            failureThreshold: 10
      volumes:
        - name: sonarqube-data
          persistentVolumeClaim:
            claimName: sonarqube-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: sonarqube
  namespace: ci-cd
spec:
  type: ClusterIP
  selector:
    app: sonarqube
  ports:
    - port: 9000
      targetPort: 9000
